name: open-local-digital-twin-dev

services:
  open-local-digital-twin-db:
    container_name: open-local-digital-twin-postgis-dev
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${TWIN_STUDIO_POSTGRES_DB:-open_local_digital_twin}
      POSTGRES_USER: ${TWIN_STUDIO_POSTGRES_USER:-open_local_digital_twin}
      POSTGRES_PASSWORD: ${TWIN_STUDIO_POSTGRES_PASSWORD:-open-local-digital-twin-dev}
    ports:
      - "${TWIN_STUDIO_POSTGRES_HOST_PORT:-45432}:5432"
    volumes:
      - open-local-digital-twin-postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWIN_STUDIO_POSTGRES_USER:-open_local_digital_twin} -d ${TWIN_STUDIO_POSTGRES_DB:-open_local_digital_twin}"]
      interval: 10s
      timeout: 5s
      retries: 8

  open-local-digital-twin:
    container_name: open-local-digital-twin-web-dev
    build: .
    depends_on:
      open-local-digital-twin-db:
        condition: service_healthy
    ports:
      - "4192:3000"
    environment:
      TWIN_STUDIO_DATABASE_URL: ${TWIN_STUDIO_DATABASE_URL:-postgresql://open_local_digital_twin:open-local-digital-twin-dev@open-local-digital-twin-db:5432/open_local_digital_twin}
      TWIN_STUDIO_DATABASE_POOL_SIZE: ${TWIN_STUDIO_DATABASE_POOL_SIZE:-12}
      TWIN_STUDIO_DATABASE_CONNECT_TIMEOUT_MS: ${TWIN_STUDIO_DATABASE_CONNECT_TIMEOUT_MS:-15000}
      TWIN_STUDIO_EMAIL_MODE: ${TWIN_STUDIO_EMAIL_MODE:-console}
      TWIN_STUDIO_SMTP_HOST: ${TWIN_STUDIO_SMTP_HOST:-}
      TWIN_STUDIO_SMTP_PORT: ${TWIN_STUDIO_SMTP_PORT:-587}
      TWIN_STUDIO_SMTP_SECURE: ${TWIN_STUDIO_SMTP_SECURE:-false}
      TWIN_STUDIO_SMTP_USER: ${TWIN_STUDIO_SMTP_USER:-}
      TWIN_STUDIO_SMTP_PASSWORD: ${TWIN_STUDIO_SMTP_PASSWORD:-}
      TWIN_STUDIO_EMAIL_FROM: ${TWIN_STUDIO_EMAIL_FROM:-noreply@example.org}
      TWIN_STUDIO_EMAIL_FROM_NAME: ${TWIN_STUDIO_EMAIL_FROM_NAME:-Open Local Digital Twin}
      TWIN_STUDIO_EMAIL_REPLY_TO: ${TWIN_STUDIO_EMAIL_REPLY_TO:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      TWIN_STUDIO_SMOKE_EMAIL: ${TWIN_STUDIO_SMOKE_EMAIL:-smoke@polisplexity.test}
      TWIN_STUDIO_SMOKE_PASSWORD: ${TWIN_STUDIO_SMOKE_PASSWORD:-local-smoke-password-change-me}
      TWIN_STUDIO_SMOKE_CITY_ID: ${TWIN_STUDIO_SMOKE_CITY_ID:-demo-city}
      TWIN_STUDIO_SMOKE_BASE_URL: ${TWIN_STUDIO_SMOKE_BASE_URL:-http://127.0.0.1:3000}
      TWIN_STUDIO_INTERNAL_BASE_URL: ${TWIN_STUDIO_INTERNAL_BASE_URL:-http://open-local-digital-twin:3000}
      TWIN_STUDIO_UPLOAD_SIGNING_SECRET: ${TWIN_STUDIO_UPLOAD_SIGNING_SECRET:-open-local-digital-twin-dev-upload-secret}
      TWIN_STUDIO_GEOJSON_MAX_FEATURES: ${TWIN_STUDIO_GEOJSON_MAX_FEATURES:-800000}
      TWIN_STUDIO_GEOJSON_MAX_BYTES: ${TWIN_STUDIO_GEOJSON_MAX_BYTES:-1610612736}
      TWIN_STUDIO_OVERTURE_BUILDINGS_MAX_FEATURES: ${TWIN_STUDIO_OVERTURE_BUILDINGS_MAX_FEATURES:-800000}
      TWIN_STUDIO_OVERTURE_BUILDINGS_TIMEOUT_MS: ${TWIN_STUDIO_OVERTURE_BUILDINGS_TIMEOUT_MS:-1200000}
      TWIN_STUDIO_BASE_ROAD_LIMIT: ${TWIN_STUDIO_BASE_ROAD_LIMIT:-1200}
      TWIN_STUDIO_BASE_BUILDING_LIMIT: ${TWIN_STUDIO_BASE_BUILDING_LIMIT:-1200}
      TWIN_STUDIO_BASE_OVERTURE_NEW_LIMIT: ${TWIN_STUDIO_BASE_OVERTURE_NEW_LIMIT:-0}
      TWIN_STUDIO_BASE_OVERTURE_MATCHED_LIMIT: ${TWIN_STUDIO_BASE_OVERTURE_MATCHED_LIMIT:-0}
      TWIN_STUDIO_BASE_FACILITY_LIMIT: ${TWIN_STUDIO_BASE_FACILITY_LIMIT:-600}
      TWIN_STUDIO_BASE_GREEN_BLUE_LIMIT: ${TWIN_STUDIO_BASE_GREEN_BLUE_LIMIT:-600}
      TWIN_STUDIO_BASE_PLACE_LIMIT: ${TWIN_STUDIO_BASE_PLACE_LIMIT:-120}
      TWIN_STUDIO_TWIN_QUERY_DEFAULT_LIMIT: ${TWIN_STUDIO_TWIN_QUERY_DEFAULT_LIMIT:-5000}
      TWIN_STUDIO_TWIN_QUERY_MAX_LIMIT: ${TWIN_STUDIO_TWIN_QUERY_MAX_LIMIT:-50000}
      TWIN_STUDIO_SEMANTIC_QUERY_DEFAULT_LIMIT: ${TWIN_STUDIO_SEMANTIC_QUERY_DEFAULT_LIMIT:-5000}
      TWIN_STUDIO_SEMANTIC_QUERY_MAX_LIMIT: ${TWIN_STUDIO_SEMANTIC_QUERY_MAX_LIMIT:-50000}
    volumes:
      - ./runtime-data:/app/runtime-data

  open-local-digital-twin-worker:
    container_name: open-local-digital-twin-worker-dev
    build: .
    command: ["npm", "run", "worker:provider-ingestion"]
    depends_on:
      open-local-digital-twin-db:
        condition: service_healthy
    environment:
      TWIN_STUDIO_DATABASE_URL: ${TWIN_STUDIO_DATABASE_URL:-postgresql://open_local_digital_twin:open-local-digital-twin-dev@open-local-digital-twin-db:5432/open_local_digital_twin}
      TWIN_STUDIO_DATABASE_POOL_SIZE: ${TWIN_STUDIO_DATABASE_POOL_SIZE:-8}
      TWIN_STUDIO_DATABASE_CONNECT_TIMEOUT_MS: ${TWIN_STUDIO_DATABASE_CONNECT_TIMEOUT_MS:-15000}
      TWIN_STUDIO_WORKER_ID: ${TWIN_STUDIO_WORKER_ID:-provider-worker-dev}
      TWIN_STUDIO_WORKER_BATCH_SIZE: ${TWIN_STUDIO_WORKER_BATCH_SIZE:-5}
      TWIN_STUDIO_WORKER_INTERVAL_MS: ${TWIN_STUDIO_WORKER_INTERVAL_MS:-10000}
      TWIN_STUDIO_INTERNAL_BASE_URL: ${TWIN_STUDIO_INTERNAL_BASE_URL:-http://open-local-digital-twin:3000}
      TWIN_STUDIO_SMOKE_EMAIL: ${TWIN_STUDIO_SMOKE_EMAIL:-smoke@polisplexity.test}
      TWIN_STUDIO_SMOKE_PASSWORD: ${TWIN_STUDIO_SMOKE_PASSWORD:-local-smoke-password-change-me}
      TWIN_STUDIO_SMOKE_CITY_ID: ${TWIN_STUDIO_SMOKE_CITY_ID:-demo-city}
      TWIN_STUDIO_SMOKE_BASE_URL: ${TWIN_STUDIO_SMOKE_BASE_URL:-http://127.0.0.1:3000}
      TWIN_STUDIO_UPLOAD_SIGNING_SECRET: ${TWIN_STUDIO_UPLOAD_SIGNING_SECRET:-open-local-digital-twin-dev-upload-secret}
      TWIN_STUDIO_GEOJSON_MAX_FEATURES: ${TWIN_STUDIO_GEOJSON_MAX_FEATURES:-800000}
      TWIN_STUDIO_GEOJSON_MAX_BYTES: ${TWIN_STUDIO_GEOJSON_MAX_BYTES:-1610612736}
      TWIN_STUDIO_OVERTURE_BUILDINGS_MAX_FEATURES: ${TWIN_STUDIO_OVERTURE_BUILDINGS_MAX_FEATURES:-800000}
      TWIN_STUDIO_OVERTURE_BUILDINGS_TIMEOUT_MS: ${TWIN_STUDIO_OVERTURE_BUILDINGS_TIMEOUT_MS:-1200000}
      TWIN_STUDIO_BASE_ROAD_LIMIT: ${TWIN_STUDIO_BASE_ROAD_LIMIT:-1200}
      TWIN_STUDIO_BASE_BUILDING_LIMIT: ${TWIN_STUDIO_BASE_BUILDING_LIMIT:-1200}
      TWIN_STUDIO_BASE_OVERTURE_NEW_LIMIT: ${TWIN_STUDIO_BASE_OVERTURE_NEW_LIMIT:-0}
      TWIN_STUDIO_BASE_OVERTURE_MATCHED_LIMIT: ${TWIN_STUDIO_BASE_OVERTURE_MATCHED_LIMIT:-0}
      TWIN_STUDIO_BASE_FACILITY_LIMIT: ${TWIN_STUDIO_BASE_FACILITY_LIMIT:-600}
      TWIN_STUDIO_BASE_GREEN_BLUE_LIMIT: ${TWIN_STUDIO_BASE_GREEN_BLUE_LIMIT:-600}
      TWIN_STUDIO_BASE_PLACE_LIMIT: ${TWIN_STUDIO_BASE_PLACE_LIMIT:-120}
    volumes:
      - ./runtime-data:/app/runtime-data

volumes:
  open-local-digital-twin-postgis-data:
